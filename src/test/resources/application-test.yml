spring:
  datasource:
    url: jdbc:h2:mem:unit_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

unit:
  security:
    jwt:
      issuer: unit-test
      secret: test-jwt-secret-must-be-at-least-32-bytes
      access-token-expiration-seconds: 1800
    refresh-token:
      expiration-seconds: 1209600 # 14일
    email-encryption:
      key-base64: ${EMAIL_ENCRYPTION_KEY_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  mail:
    enabled: false
  consent:
    terms-version: 2026-05-14-test
    privacy-policy-version: 2026-05-14-test
