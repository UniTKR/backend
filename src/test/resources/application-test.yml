spring:
  datasource:
    url: jdbc:h2:mem:unit_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

unit:
  security:
    jwt:
      issuer: unit-api-test
      access-token-ttl: 30m
      refresh-token-ttl: 14d
      secret: test-secret-must-be-at-least-32-bytes
