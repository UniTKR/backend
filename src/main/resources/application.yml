server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ${SPRING_APPLICATION_NAME:unit-backend}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    time-zone: ${APP_TIME_ZONE:Asia/Seoul}
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: ${APP_TIME_ZONE:Asia/Seoul}

  modulith:
    runtime:
      verification-enabled: false

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus,modulith
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.unit: ${APP_LOG_LEVEL:INFO}
    org.springframework.modulith: INFO

unit:
  cors:
    allowed-origins: ${UNIT_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  security:
    jwt:
      issuer: ${JWT_ISSUER:unit}
      secret: ${JWT_SECRET}
      access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
    refresh-token:
      expiration-seconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
    email-encryption:
      key-base64: ${EMAIL_ENCRYPTION_KEY_BASE64}
  consent:
    terms-version: ${TERMS_VERSION:2026-05-14}
    privacy-policy-version: ${PRIVACY_POLICY_VERSION:2026-05-14}
  school-email-verification:
    code-expiration-seconds: ${SCHOOL_EMAIL_VERIFICATION_CODE_EXPIRATION_SECONDS:300}
    resend-cooldown-seconds: ${SCHOOL_EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
    max-attempt-count: ${SCHOOL_EMAIL_VERIFICATION_MAX_ATTEMPT_COUNT:5}
    verification-expiration-days: ${SCHOOL_VERIFICATION_EXPIRATION_DAYS:365}